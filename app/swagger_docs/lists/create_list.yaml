tags:
  - Lists
summary: Crea una nueva lista en un tablero existente.
operationId: createList
description: |
  Este endpoint permite a un usuario autenticado crear una nueva lista dentro de un tablero específico.
  La lista se puede posicionar al final o al inicio (a la derecha o izquierda) dependiendo del valor de `side`.

  Si se especifica `side: "left"`, la nueva lista se insertará en la primera posición, desplazando las demás.
  Si se especifica `side: "right"` (por defecto), se agregará al final.

  El usuario debe ser miembro del tablero.
security:
  - BearerAuth: []
consumes:
  - application/json
produces:
  - application/json
parameters:
  - name: board_id
    in: path
    required: true
    type: integer
    description: ID del tablero al que se desea agregar la nueva lista.
    example: 12
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Nombre de la nueva lista. Es un campo obligatorio.
          example: Tareas por hacer
        side:
          type: string
          description: |
            Lado donde se insertará la lista. Si es `"left"`, se inserta en la primera posición. 
            Si es `"right"`, se inserta al final.
            Por defecto es `"right"`.
          enum:
            - left
            - right
          example: right
responses:
  201:
    description: Lista creada exitosamente.
    schema:
      type: object
      properties:
        id:
          type: integer
          example: 45
        name:
          type: string
          example: Tareas por hacer
        position:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
          example: "2025-08-04T22:13:21.000Z"
        board_id:
          type: integer
          example: 12
        cards:
          type: array
          description: Lista de tarjetas dentro de la lista (vacía al crearse).
          items:
            type: object
  400:
    description: 
      Petición inválida debido a campos faltantes o incorrectos.
    schema:
      type: object
      properties:
        error:
          type: string
          example: "Campos requeridos: 'name' y 'side' (left o right)"
  401:
    description: No autorizado. Se requiere un token JWT válido.
    schema:
      type: object
      properties:
        msg:
          type: string
          example: Missing Authorization Header
  404:
    description: El tablero no fue encontrado o el usuario no tiene acceso.
    schema:
      type: object
      properties:
        error:
          type: string
          example: El tablero con id 12 no fue encontrado o no tienes acceso
  500:
    description: Error interno del servidor al intentar crear la lista.
    schema:
      type: object
      properties:
        error:
          type: string
          example: Error interno del servidor
