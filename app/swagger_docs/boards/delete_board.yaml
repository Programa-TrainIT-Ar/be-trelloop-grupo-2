tags:
  - Boards
summary: Elimina un tablero espec\u00edfico.
operationId: deleteBoard
description: |
  Este endpoint permite al usuario autenticado eliminar un tablero espec\u00edfico por su ID.
  La eliminaci\u00f3n solo es posible si el usuario autenticado es el propietario (`owner_id`) del tablero.
security:
  - BearerAuth: []
produces:
  - application/json
parameters:
  - name: board_id
    in: path
    description: El ID \u00fanico del tablero a eliminar.
    required: true
    type: integer
    format: int64
    example: 1
responses:
  202:
    description: Tablero eliminado exitosamente. Retorna los datos del tablero eliminado.
    schema:
      type: object
      properties:
        id:
          type: integer
          description: ID \u00fanico del tablero eliminado.
          example: 1
        board_image_url:
          type: string
          format: url
          description: URL de la imagen del tablero.
          example: https://example.com/board_to_be_deleted.jpg
        name:
          type: string
          description: Nombre del tablero eliminado.
          example: Tablero de Prueba a Eliminar
        description:
          type: string
          description: Descripci\u00f3n del tablero.
          example: Un tablero que ha sido eliminado.
        owner_id:
          type: integer
          description: ID del usuario propietario del tablero eliminado.
          example: 1
        status:
          type: string
          description: Estado de visibilidad del tablero.
          enum:
            - PUBLIC
            - PRIVATE
          example: PRIVATE
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creaci\u00f3n del tablero.
          example: "2025-07-29T09:00:00.000Z"
        members:
          type: array
          description: Lista de usuarios miembros del tablero.
          items:
            type: object
            properties:
              id:
                type: integer
                example: 2
              name:
                type: string
                example: Maria
              last_name:
                type: string
                example: Gonz\u00e1lez
              email:
                type: string
                example: maria.gonzalez@example.com
        tags:
          type: array
          description: Lista de nombres de etiquetas asociadas al tablero.
          items:
            type: string
          example: ["eliminado", "obsoleto"]
  401:
    description: No autorizado. Un token JWT v\u00e1lido es requerido.
    schema:
      type: object
      properties:
        msg:
          type: string
          example: Missing Authorization Header
  403:
    description: Prohibido. El usuario autenticado no es el propietario del tablero.
    schema:
      type: object
      properties:
        error:
          type: string
          example: No tienes permiso para eliminar este tablero
  404:
    description: Tablero no encontrado.
    schema:
      type: object
      properties:
        error:
          type: string
          example: "El tablero con id: 1 no fue encontrado"
  500:
    description: Error interno del servidor al intentar eliminar el tablero.
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error al eliminar el tablero